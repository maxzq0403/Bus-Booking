<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองที่นั่งรถบัส</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #f4f7f6; text-align: center; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .bus-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .seat { padding: 15px 5px; border-radius: 8px; color: white; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .available { background: #2ecc71; }
        .booked { background: #e74c3c; cursor: not-allowed; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">กำลังโหลด...</div>
    <div class="header"><h1>🚌 ระบบจองที่นั่งรถบัส</h1></div>
    <div class="bus-grid" id="busMap"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/a/macros/cba.ac.th/s/AKfycbw4YRpu0xVq8YWPV2QUsFCPNfXyumP_81ZXxRDJNDrd8YlAAeM2K5WjZda_GD2AOPWO/exec"; //
        let seatsData = {};

        async function loadData() {
            document.getElementById('loader').style.display = 'flex';
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                seatsData = {};
                data.slice(1).forEach(row => { seatsData[row[0]] = row[1]; });
                render();
            } catch (e) { alert('โหลดข้อมูลไม่สำเร็จ'); }
            document.getElementById('loader').style.display = 'none';
        }

        async function reserve(num) {
            if (seatsData[num]) return;
            const name = prompt(`จองที่นั่งหมายเลข ${num} ในชื่อ:`);
            if (!name) return;

            document.getElementById('loader').style.display = 'flex';
            const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify({ seat: num, name: name })
});
            const result = await res.text();
            if (result === "Taken") alert("ที่นั่งนี้เพิ่งถูกจองไป!");
            loadData();
        }

        function render() {
            const map = document.getElementById('busMap');
            map.innerHTML = '';
            for (let i = 1; i <= 40; i++) {
                const div = document.createElement('div');
                div.className = `seat ${seatsData[i] ? 'booked' : 'available'}`;
                div.innerHTML = `<b>${i}</b><br><small>${seatsData[i] || 'ว่าง'}</small>`;
                div.onclick = () => reserve(i);
                map.appendChild(div);
            }
        }
        loadData();
    </script>
</body>
</html>
